name: Build Linux (X11 for XWayland)

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build-linux:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install X11 dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxi-dev \
            libgl1-mesa-dev \

      # 配置 CMake
      - name: Configure CMake
        run: |
          cmake -B build \
            -DCMAKE_C_COMPILER=gcc \
            -DCMAKE_CXX_COMPILER=g++ \
            -DCMAKE_BUILD_TYPE=Release \
            -DEMBED_ASSETS=ON

      # 编译
      - name: Build
        run: cmake --build build --config Release

      # 上传产物
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tetris-linux-gcc
          path: build/tetris   
