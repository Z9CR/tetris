name: Build Wayland Version

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build-wayland:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # 安装 Wayland 及其依赖库（编译时必需）
      - name: Install Wayland dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwayland-dev \
            libxkbcommon-dev \
            libgl1-mesa-dev \
            libdrm-dev \
            libgbm-dev

      # 配置 CMake
      - name: Configure CMake
        run: |
          cmake -B build \
            -DCMAKE_C_COMPILER=gcc \
            -DCMAKE_CXX_COMPILER=g++ \
            -DCMAKE_BUILD_TYPE=Release \
            -DEMBED_ASSETS=ON \

      # 编译
      - name: Build
        run: cmake --build build --config Release

      # 上传构建产物作为 artifact
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tetris-wayland
          path: build/tetris
